<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WRO Technical Summary</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&family=Inter:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    :root {
      --main-blue: #0d47a1;
      --light-blue: #1976d2;
      --gradient-blue: linear-gradient(135deg, #0d47a1 0%, #1a237e 100%);
      --glass-bg: rgba(255, 255, 255, 0.9);
    }
    
    body { 
      background: #f0f2f5; 
      font-family: 'Prompt', 'Inter', sans-serif; 
      color: #334155;
    }

    .header-section {
      background: var(--gradient-blue);
      color: white;
      padding: 40px 0;
      border-radius: 0 0 40px 40px;
      box-shadow: 0 10px 30px rgba(13, 71, 161, 0.2);
    }

    .brand-title {
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .card {
      background: var(--glass-bg);
      border: none;
      border-radius: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.05);
      backdrop-filter: blur(10px);
      transition: 0.3s;
    }

    .form-label { font-weight: 600; color: var(--main-blue); margin-bottom: 8px; }

    .form-select, .form-control {
      border-radius: 12px;
      padding: 12px;
      border: 1px solid #e2e8f0;
    }

    .form-select:focus, .form-control:focus {
      border-color: var(--light-blue);
      box-shadow: 0 0 0 4px rgba(25, 118, 210, 0.1);
    }

    .summary-box {
      background: #f8faff;
      border: 1px solid #e0e7ff;
      border-radius: 16px;
      padding: 20px;
    }

    .btn-pass {
      background: linear-gradient(135deg, #2e7d32 0%, #1b5e20 100%);
      border: none; color: white; border-radius: 15px; padding: 18px;
      transition: 0.3s;
    }

    .btn-fail {
      background: linear-gradient(135deg, #d32f2f 0%, #b71c1c 100%);
      border: none; color: white; border-radius: 15px; padding: 18px;
      transition: 0.3s;
    }

    .btn-pass:hover, .btn-fail:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
    .btn-pass:disabled, .btn-fail:disabled { background: #cbd5e1; color: #94a3b8; transform: none; box-shadow: none; cursor: not-allowed; }

    .label-tag { font-size: 0.8rem; color: #64748b; margin-bottom: 2px; display: block; }
    .val-text { font-weight: 600; color: #1e293b; display: block; font-size: 1.1rem; }
    .btn-review-img { font-size: 0.8rem; padding: 4px 10px; border-radius: 8px; font-weight: 600; margin-top: 6px; text-decoration: none; display: inline-flex; align-items: center; gap: 4px;}
    
    /* 🟢 สไตล์เพิ่มเติมสำหรับป้ายแสดงสถานะตัวหนาอ่านง่าย */
    .status-badge-custom {
      display: inline-block;
      width: 100%;
      padding: 10px;
      font-size: 1.05rem;
      font-weight: 600;
      text-align: center;
      border-radius: 10px;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>

  <div class="header-section text-center mb-5">
    <h1 class="brand-title h2">Technical Summary Digital Form</h1>
    <p class="mb-0 opacity-75">World Robot Olympiad 2026</p>
  </div>

  <div class="container pb-5">
    <div class="row justify-content-center">
      <div class="col-lg-7 col-md-9">
        
        <div class="card p-4 mb-4">
          <h5 class="mb-4 d-flex align-items-center">
            <span class="badge bg-primary me-2 rounded-pill">1</span> ข้อมูลทีม
          </h5>
          
          <div class="row">
            <div class="col-md-12 mb-3">
              <label class="form-label">Age Group</label>
              <select id="ageGroup" class="form-select" onchange="onAgeGroupChange()">
                <option value="" selected disabled>เลือกช่วงอายุ...</option>
                <option value="Elementary">Elementary</option>
                <option value="Junior">Junior</option>
                <option value="Senior">Senior</option>
              </select>
            </div>
            
            <div class="col-md-6 mb-3">
              <label class="form-label">Group</label>
              <select id="group" class="form-select" onchange="onGroupChange()" disabled>
                <option value="">เลือกกลุ่ม...</option>
              </select>
            </div>

            <div class="col-md-6 mb-3">
              <label class="form-label">Team ID</label>
              <select id="teamId" class="form-select" onchange="onTeamIdChange()" disabled>
                <option value="">เลือก ID...</option>
              </select>
            </div>
          </div>

          <div id="summarySection" class="summary-box mt-3 d-none">
            <div class="row g-3">
              <div class="col-6">
                <span class="label-tag">Team Name</span>
                <span id="lblTeamName" class="val-text">-</span>
              </div>
              <div class="col-6"> 
                <span class="label-tag">Controller</span>
                <span id="lblController" class="val-text">-</span>
              </div>
              <div class="col-6">
                <span class="label-tag">Institution</span>
                <span id="lblInst" class="val-text">-</span>
              </div>
              <div class="col-6">
                <span class="label-tag">Review Status</span>
                <span id="lblStatus" class="val-text">-</span>
              </div>
              <div class="col-12 mt-3 pt-2 border-top">
                <span class="label-tag mb-1">Technical Status (ผลการตรวจสอบ)</span>
                <div id="lblTechResult">-</div>
              </div>
            </div>
          </div>
        </div>

        <div id="step2Card" class="card p-4 d-none">
          <h5 class="mb-4 d-flex align-items-center">
            <span class="badge bg-primary me-2 rounded-pill">2</span> Technical Review
          </h5>
          
          <div class="mb-4">
            <label class="form-label">ถ่ายภาพประกอบการตรวจสอบ</label>
            <input type="file" id="imageInput" accept="image/*" capture="environment" class="form-control">
          </div>

          <div class="row g-3">
            <div class="col-6">
              <button id="btnPass" class="btn btn-pass w-100 fw-bold" onclick="submitForm('PASS')">ผ่าน (PASS)</button>
            </div>
            <div class="col-6">
              <button id="btnFail" class="btn btn-fail w-100 fw-bold" onclick="submitForm('FAIL')">ไม่ผ่าน (FAIL)</button>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script>
    const GOOGLE_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxiyKLpzSwCPrQ_Qy9MsYgp7HssPIfw7xRk5p37oOGTIq8ST0vN4RGzRj6m6oGxc_QPWQ/exec"; 
    let globalTeamsData = [];
    let selectedTeamObj = null;

    document.addEventListener('DOMContentLoaded', () => {
      const savedAge = localStorage.getItem('wro_ageGroup');
      if (savedAge) {
        document.getElementById('ageGroup').value = savedAge;
        onAgeGroupChange(true); 
      }
    });

    function callBackend(action, payload, onSuccess) {
      if (typeof google !== 'undefined') {
        if (action === 'getData') google.script.run.withSuccessHandler(onSuccess).getTeamData(payload.ageGroup);
        else google.script.run.withSuccessHandler(onSuccess).saveData(payload);
      } else {
        let url = action === 'getData' ? `${GOOGLE_WEB_APP_URL}?action=getData&ageGroup=${payload.ageGroup}` : GOOGLE_WEB_APP_URL;
        let options = action === 'getData' ? {method:'GET'} : {method:'POST', body: JSON.stringify({action:'saveData', data:payload}), headers:{'Content-Type':'text/plain'}};
        fetch(url, options).then(res => res.json()).then(res => action === 'getData' ? onSuccess(res) : onSuccess(res.data)).catch(err => Swal.fire('Error', err.toString(), 'error'));
      }
    }

    function onAgeGroupChange(isRestoring = false) {
      const ageGroup = document.getElementById('ageGroup').value;
      if (!ageGroup) return;

      localStorage.setItem('wro_ageGroup', ageGroup);

      document.getElementById('teamId').innerHTML = '<option value="">เลือก ID...</option>';
      document.getElementById('teamId').disabled = true;
      document.getElementById('imageInput').value = "";
      document.getElementById('summarySection').classList.add('d-none');
      document.getElementById('step2Card').classList.add('d-none');
      
      Swal.fire({ title: 'Please wait...', didOpen: () => Swal.showLoading(), allowOutsideClick: false });
      
      callBackend('getData', { ageGroup: ageGroup }, function(data) {
        Swal.close();
        globalTeamsData = data;
        const groups = [...new Set(data.map(item => item.group.replace(/\d+/g, '').trim()))].filter(g => g !== "");
        const groupSelect = document.getElementById('group');
        groupSelect.innerHTML = '<option value="">เลือกกลุ่ม...</option>';
        groups.forEach(g => { groupSelect.innerHTML += `<option value="${g}">${g}</option>`; });
        groupSelect.disabled = false;

        const savedGroup = localStorage.getItem('wro_group');
        if (savedGroup && groups.includes(savedGroup)) {
          groupSelect.value = savedGroup;
          onGroupChange();
        } else if (!isRestoring) {
          localStorage.removeItem('wro_group');
        }
      });
    }

    function onGroupChange() {
      const selectedGroup = document.getElementById('group').value;
      if (!selectedGroup) return;

      localStorage.setItem('wro_group', selectedGroup);

      const teamIdSelect = document.getElementById('teamId');
      const filteredTeams = globalTeamsData.filter(t => t.group.replace(/\d+/g, '').trim() === selectedGroup);
      
      filteredTeams.sort((a, b) => {
        return a.teamId.localeCompare(b.teamId, undefined, { numeric: true, sensitivity: 'base' });
      });
      
      teamIdSelect.innerHTML = '<option value="">เลือก ID...</option>';
      
      filteredTeams.forEach(t => { 
        if(t.teamId) {
          let displayText = t.teamId;
          let styleColor = "";
          
          if (t.checked) {
            displayText += " ✔️ (ตรวจแล้ว)";
            styleColor = 'style="color: #2e7d32; font-weight: bold;"'; 
          }
          
          teamIdSelect.innerHTML += `<option value="${t.teamId}" ${styleColor}>${displayText}</option>`; 
        } 
      });
      
      teamIdSelect.disabled = false;
      document.getElementById('summarySection').classList.add('d-none');
      document.getElementById('step2Card').classList.add('d-none');
    }

    function onTeamIdChange() {
      const selectedId = document.getElementById('teamId').value;
      selectedTeamObj = globalTeamsData.find(t => t.teamId === selectedId);
      if (selectedTeamObj) {
        document.getElementById('lblTeamName').innerText = selectedTeamObj.teamName;
        document.getElementById('lblInst').innerText = selectedTeamObj.institution;
        document.getElementById('lblController').innerText = selectedTeamObj.controller || '-';
        
        const statusEl = document.getElementById('lblStatus');
        const techResultEl = document.getElementById('lblTechResult'); // 🟢 ลิงก์ช่องแสดงสถานะผลตรวจใหม่
        const imageInput = document.getElementById('imageInput');
        const btnPass = document.getElementById('btnPass');
        const btnFail = document.getElementById('btnFail');

        if (selectedTeamObj.checked) {
          let statusHtml = '<span class="badge bg-success fs-6">✔️ ตรวจแล้ว</span>';
          if (selectedTeamObj.imageUrl) {
            statusHtml += `<br><a href="${selectedTeamObj.imageUrl}" target="_blank" class="btn btn-primary text-white btn-review-img">👁️ Preview</a>`;
          }
          statusEl.innerHTML = statusHtml;

          // 🟢 ตรวจสอบสถานะและใส่สีพื้นหลัง (Badge) ให้โดดเด่นมองง่าย
          if (selectedTeamObj.status === 'PASS') {
            techResultEl.innerHTML = '<span class="status-badge-custom bg-success text-white">🟢 ผ่านการตรวจสอบ (PASS)</span>';
          } else if (selectedTeamObj.status === 'FAIL') {
            techResultEl.innerHTML = '<span class="status-badge-custom bg-danger text-white">🔴 ไม่ผ่านการตรวจสอบ (FAIL)</span>';
          } else {
            techResultEl.innerHTML = '<span class="status-badge-custom bg-warning text-dark">⚠️ ตรวจแล้ว แต่ไม่มีข้อมูลสถานะ</span>';
          }

          imageInput.disabled = true;
          btnPass.disabled = true;
          btnFail.disabled = true;
        } else {
          statusEl.innerHTML = '<span class="badge bg-secondary fs-6">ยังไม่ได้ตรวจสอบ</span>';
          techResultEl.innerHTML = '<span class="text-muted fs-6 italic">⏳ รอการบันทึกผลการตรวจสอบ</span>'; // 🟢 ถ้ายังไม่ตรวจให้แสดงข้อความรอ
          imageInput.disabled = false;
          btnPass.disabled = false;
          btnFail.disabled = false;
        }
        
        document.getElementById('summarySection').classList.remove('d-none');
        document.getElementById('step2Card').classList.remove('d-none');
      }
    }

    function submitForm(status) {
      const file = document.getElementById('imageInput').files[0];
      const payload = {
        ageGroup: document.getElementById('ageGroup').value,
        group: selectedTeamObj.group,
        teamId: selectedTeamObj.teamId,
        teamName: selectedTeamObj.teamName,
        institution: selectedTeamObj.institution,
        controller: selectedTeamObj.controller || "", 
        status: status,
        imageB64: ""
      };

      Swal.fire({
        title: 'กำลังบันทึกข้อมูล',
        text: 'กำลังประมวลผล...',
        didOpen: () => Swal.showLoading(),
        allowOutsideClick: false
      });

      if (file) {
        const reader = new FileReader();
        reader.onloadend = () => { payload.imageB64 = reader.result; sendData(payload); };
        reader.readAsDataURL(file);
      } else { sendData(payload); }
    }

    function sendData(payload) {
      callBackend('saveData', payload, function() {
        Swal.fire({ icon: 'success', title: 'สำเร็จ', text: 'บันทึกเรียบร้อยแล้ว', timer: 1500, showConfirmButton: false })
        .then(() => {
          onAgeGroupChange(true); 
        });
      });
    }

    function resetForm(all) {
      if(all) {
        document.getElementById('ageGroup').value = "";
        localStorage.removeItem('wro_ageGroup');
        localStorage.removeItem('wro_group');
        document.getElementById('group').innerHTML = '<option value="">เลือกกลุ่ม...</option>';
        document.getElementById('group').disabled = true;
      }
      document.getElementById('teamId').innerHTML = '<option value="">เลือก ID...</option>';
      document.getElementById('teamId').disabled = true;
      document.getElementById('imageInput').value = "";
      
      document.getElementById('imageInput').disabled = false;
      document.getElementById('btnPass').disabled = false;
      document.getElementById('btnFail').disabled = false;

      document.getElementById('summarySection').classList.add('d-none');
      document.getElementById('step2Card').classList.add('d-none');
    }
  </script>
</body>
</html>
